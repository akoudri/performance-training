# =============================================================================
# Resonance — postgresql.conf production-tuned (solution/j3-postgres)
# =============================================================================
# Monté en read-only sur /etc/postgresql/postgresql.conf, démarrage via :
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#
# Les valeurs ci-dessous remplacent intégralement le fichier par défaut de
# l'image postgres:16-alpine (shared_buffers=128MB, work_mem=4MB…). Postgres
# applique ses defaults pour tout ce qui n'est pas listé ici. pg_hba.conf
# reste géré par l'image (POSTGRES_HOST_AUTH_METHOD=scram-sha-256).
#
# @perf-fix: tuning Postgres — résout le @perf-debt §8 starter
# "config postgresql.conf par défaut" (cf. resonance-spec.md §9).
# =============================================================================

# ---- Connexions -------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# ---- Mémoire (cibles spec §9) -----------------------------------------------
# shared_buffers = 25 % de la RAM disponible côté Postgres (~ 4 GB → 1 GB).
# effective_cache_size = ~ 75 % de la RAM (heuristique planner, pas alloué).
# work_mem appliqué par opération de tri/hash (×N par requête concurrente).
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# ---- WAL / checkpoints ------------------------------------------------------
# checkpoint_timeout + max_wal_size relâchés pour éviter les checkpoints
# forcés sous bench k6 (200 k tickets seedés en peu de temps + pic checkout).
wal_buffers = 16MB
checkpoint_timeout = 15min
max_wal_size = 2GB

# ---- Planner (SSD) ----------------------------------------------------------
# random_page_cost rapproché du seq_page_cost (1.0) parce qu'un SSD a une
# latence aléatoire ≈ séquentielle. Sans ce réglage, le planner sous-estime
# la rentabilité d'un Index Scan vs un Seq Scan sur de petites sélectivités.
random_page_cost = 1.1
effective_io_concurrency = 200

# ---- Recherche full-text par défaut -----------------------------------------
# La GIN tsvector index utilise to_tsvector('french', …) explicitement, mais
# default_text_search_config sert de fallback aux requêtes ad hoc (psql,
# EXPLAIN suite, etc.).
default_text_search_config = 'pg_catalog.french'

# ---- Logging (training-friendly) --------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_timezone = 'UTC'

# ---- Locale (defaults safe sur image postgres:16-alpine) --------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
