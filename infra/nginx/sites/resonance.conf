# =============================================================================
# Resonance — virtual host (j3-laravel : Octane + FrankenPHP)
# =============================================================================
# Frontal HTTP unique pour la stack Resonance :
#   - /api/*    → proxy_pass http://backend:8000 (Octane FrankenPHP).
#   - /horizon  → idem.
#   - le reste  → proxy_pass http://frontend:3000 (Nuxt SSR Node preview).
#
# Tout ce qui touche au caching HTTP, à la compression, à HTTP/2 et au
# Cache-Control sur les assets statiques est volontairement absent — chaque
# absence porte un marqueur @perf-debt et sera résolue dans la branche
# solution/j1-cdn-cache.
# =============================================================================

# @perf-fix: backend HTTP (Octane FrankenPHP) au lieu de FastCGI.
# `keepalive 32` réutilise les connexions TCP entre Nginx et Octane,
# ce qui économise le 3-way handshake sur chaque requête.
upstream backend_octane {
    server backend:8000;
    keepalive 32;
}

upstream nuxt_node {
    server frontend:3000;
}

server {
    # @perf-debt: HTTP/1.1 uniquement. Pas de `listen … http2;` ni TLS.
    # Résolu en branche solution/j1-cdn-cache (`listen 443 ssl http2;`).
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 64M;

    # ---- API Laravel (proxy HTTP vers Octane FrankenPHP) -------------------
    # Tout `/api/*` est forwardé en HTTP au backend Octane sur :8000.
    # Plus de SCRIPT_FILENAME / FastCGI : Octane sert HTTP nativement.
    location /api/ {
        proxy_pass http://backend_octane;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts généreux : checkout démo peut prendre ~ 1.5 s avec mock
        # paiement préservé (les jobs PDF/email sont déjà en queue Redis).
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Dashboard Horizon (Laravel) ---------------------------------------
    # Pages SPA + API Horizon servies par Octane sur /horizon/*. Gate
    # ouvert en local par défaut (Laravel\Horizon\Http\Middleware\
    # Authenticate). Horizon 5.46 inline ses assets (data URI), pas
    # besoin de location séparée pour /vendor/horizon/*.
    location /horizon {
        proxy_pass http://backend_octane;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Statiques Nuxt (_nuxt/*) -------------------------------------------
    # @perf-debt: pas de Cache-Control sur _nuxt/*. Pourtant ces assets sont
    # immutables (URL fingerprintée par Vite), candidats parfaits à
    # `Cache-Control: public, max-age=31536000, immutable`. Résolu en branche
    # solution/j1-cdn-cache.
    location /_nuxt/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pas de `expires`, pas de `add_header Cache-Control` — voir @perf-debt.
    }

    # ---- Médias servis par Nuxt (cas marginal) ------------------------------
    # Le starter référence les médias directement depuis MinIO via
    # NUXT_PUBLIC_MEDIA_BASE (browser → :9000). Cette location reste pour
    # cohérence si un asset /media/* est jamais servi par Nuxt.
    # @perf-debt: pas de Cache-Control sur /media/*. Résolu en branche
    # solution/j1-cdn-cache (`Cache-Control: public, max-age=86400, ...`).
    location /media/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Tout le reste → Nuxt SSR -------------------------------------------
    location / {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
