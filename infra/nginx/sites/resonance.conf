# =============================================================================
# Resonance — virtual host (solution/j1-cdn-cache)
# =============================================================================
# Frontal HTTP unique pour la stack Resonance :
#   - /api/*   → fastcgi_pass backend:9000 (PHP-FPM, front-controller
#                 /app/public/index.php).
#   - le reste → proxy_pass http://frontend:3000 (Nuxt SSR Node preview).
#
# J1 ajoute : HTTP/2 (h2c), Cache-Control immutable sur /_nuxt/*, Cache-Control
# stale-while-revalidate sur /media/*. La compression (gzip + brotli) est
# activée au niveau http {} dans nginx.conf.
# =============================================================================

upstream backend_fpm {
    # @perf-debt: pas de `keepalive` ni `fastcgi_keep_conn on;` — chaque
    # requête FastCGI ouvre une connexion neuve. Réservé à solution/j3-laravel
    # (couplé au tuning FPM/Octane).
    server backend:9000;
}

upstream nuxt_node {
    server frontend:3000;
}

server {
    # @perf-fix: solution/j1-cdn-cache — HTTP/2 (h2c, sans TLS) activé via
    # la directive `http2 on;` (syntaxe Nginx 1.25+, compatible avec l'image
    # fholzer/nginx-brotli courante). TLS reste hors scope J1 — pas de port
    # 443 ni de certificat (la formation tourne sur localhost).
    listen 80 default_server;
    listen [::]:80 default_server;
    http2 on;
    server_name _;

    client_max_body_size 64M;

    # ---- API Laravel (FastCGI vers PHP-FPM) ---------------------------------
    # Tout `/api/*` est forwardé au front-controller `/app/public/index.php`.
    # Le Cache-Control des réponses est posé applicativement par le middleware
    # Laravel `SetEventsCacheControl` (cf. backend/app/Http/Middleware/).
    location /api/ {
        fastcgi_pass backend_fpm;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME  /app/public/index.php;
        fastcgi_param SCRIPT_NAME      /index.php;
        fastcgi_param DOCUMENT_ROOT    /app/public;
        fastcgi_param REQUEST_URI      $request_uri;
        fastcgi_param QUERY_STRING     $query_string;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;

        # Timeouts généreux : le checkout starter peut atteindre 25 s sous
        # charge (cf. baseline k6-starter checkout-stress).
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    # ---- Statiques Nuxt (_nuxt/*) -------------------------------------------
    # @perf-fix: solution/j1-cdn-cache — Cache-Control immutable sur /_nuxt/*.
    # Vite fingerprinte les URLs (chunk hash dans le nom de fichier), donc
    # une URL `/_nuxt/abc123.js` est par construction immutable : on peut
    # demander au browser de la mettre en cache 1 an sans revalidation.
    # Effet : passées la première visite, plus aucun aller-retour réseau
    # sur le bundle Nuxt → LCP/FCP en revisite chutent drastiquement.
    location /_nuxt/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ---- Médias servis via Nginx (cas marginal) -----------------------------
    # Le starter référence les médias directement depuis MinIO via
    # NUXT_PUBLIC_MEDIA_BASE (browser → :9000). Cette location reste pour
    # cohérence si un asset /media/* est jamais servi par Nuxt — et porte
    # désormais un Cache-Control prêt pour le jour où on basculera la
    # délivrance médias derrière Nginx.
    # @perf-fix: solution/j1-cdn-cache — Cache-Control public 1 jour +
    # stale-while-revalidate 7 jours sur /media/*. Les chemins MinIO ne sont
    # pas fingerprintés → on évite max-age=immutable, mais SWR couvre les
    # revisites en arrière-plan.
    location /media/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    }

    # ---- Tout le reste → Nuxt SSR -------------------------------------------
    location / {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
