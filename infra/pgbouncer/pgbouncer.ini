;; ============================================================================
;; Resonance — PgBouncer config (solution/j3-postgres)
;; ============================================================================
;; Monté en read-only sur /etc/pgbouncer/pgbouncer.ini.
;; userlist.txt n'est PAS committé — l'entrypoint edoburu/pgbouncer le
;; génère au démarrage à partir des env vars DB_USER + DB_PASSWORD
;; (= "pgbouncer" + $PGBOUNCER_PASSWORD), aucun hash dans le repo.
;;
;; Mode pooling : transaction. Permet à un faible nombre de backends
;; Postgres (default_pool_size = 25) de servir un grand nombre de
;; clients FPM/Octane (max_client_conn = 100), sans surcharger Postgres.
;;
;; @perf-fix: PgBouncer en frontal — résout le @perf-debt §8 starter
;; "pas de PgBouncer" (cf. resonance-spec.md §9).
;; ============================================================================

[databases]
;; auth_user = pgbouncer → PgBouncer interrogera pgbouncer.user_lookup()
;; côté Postgres (cf. infra/postgres/init/01-pgbouncer-auth.sh) pour
;; valider chaque client (résolution SCRAM passthrough).
resonance = host=postgres port=5432 dbname=resonance auth_user=pgbouncer

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

;; -- Authentification ------------------------------------------------------
;; SCRAM passthrough : PgBouncer s'authentifie auprès de Postgres en tant
;; que "pgbouncer" (cleartext via env), puis utilise auth_query pour
;; chaque client. Aucun hash committé dans userlist.txt.
auth_type = scram-sha-256
auth_user = pgbouncer
auth_query = SELECT uname, phash FROM pgbouncer.user_lookup($1)
auth_file = /etc/pgbouncer/userlist.txt

;; -- Pooling ---------------------------------------------------------------
;; pool_mode=transaction : PgBouncer rend un backend au pool dès qu'un
;; client COMMIT/ROLLBACK. Trade-off : interdit les prepared statements
;; cross-transaction et SET persistant. Côté Laravel, PDO emule les
;; prepares (cf. backend/config/database.php) → compatible.
pool_mode = transaction
max_client_conn = 100
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_idle_timeout = 600

;; -- Logging ---------------------------------------------------------------
;; Volontairement silencieux pour ne pas polluer les mesures k6.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
verbose = 0
