# =============================================================================
# Resonance — stack locale
# =============================================================================
# Phase 1 du scaffold : services d'infra uniquement.
# Les conteneurs applicatifs (backend Laravel, frontend Nuxt, nginx, pgbouncer)
# seront ajoutés dans les phases ultérieures.
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-resonance}

services:
  postgres:
    image: postgres:16-alpine
    container_name: resonance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resonance

  redis:
    image: redis:7-alpine
    container_name: resonance-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - resonance

  minio:
    image: minio/minio:latest
    container_name: resonance-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION:-eu-west-3}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - resonance

  # Bootstrap : crée le bucket `resonance` au premier démarrage puis sort.
  # Idempotent grâce à `mc mb -p` (no-op si le bucket existe déjà).
  minio-init:
    image: minio/mc:latest
    container_name: resonance-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      mc mb -p local/\"$$MINIO_BUCKET\";
      mc anonymous set download local/\"$$MINIO_BUCKET\";
      echo 'Bucket '\"$$MINIO_BUCKET\"' prêt.';
      "
    restart: "no"
    networks:
      - resonance

  mailpit:
    # Remplace mailhog (deprecated, pas d'image arm64 officielle).
    # Mailpit est un drop-in moderne, multi-arch et activement maintenu.
    image: axllent/mailpit:latest
    container_name: resonance-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    volumes:
      - mailpit_data:/data
    networks:
      - resonance

  # Backend Laravel — PHP 8.3 + FPM (Phase 4-bis : starter prod-like).
  # FPM écoute sur :9000 en interne (réseau Docker uniquement). Nginx fait
  # fastcgi_pass vers backend:9000 pour le préfixe /api/* (cf. service nginx).
  # Aucun port HTTP exposé sur l'host : tout passe par Nginx :8080.
  # @perf-debt: opcache désactivé / pas d'Octane — résolus en J3.
  backend:
    build:
      context: ./infra/docker
      dockerfile: backend.Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: resonance/backend:dev
    container_name: resonance-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      # Cache local des médias placeholders téléchargés une fois depuis
      # picsum.photos puis uploadés dans MinIO (cf. resonance-spec.md §7).
      - ./infra/seeds-dump:/seeds-dump
    # Pas de mapping host:9000 (FastCGI ≠ HTTP, inutile en direct ; conservé
    # uniquement sur le réseau Compose pour Nginx).
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    networks:
      - resonance
    # CMD = `php-fpm -F` (cf. infra/docker/backend.Dockerfile).

  # Frontend Nuxt 4 (Node 20) — starter prod-like (Phase 4-bis).
  # Image multi-stage (builder + runtime) : le source est embarqué et le
  # build prod (`npm run build`) tourne au build de l'image. Plus de
  # hot-reload, plus de bind-mount. Pour rebâtir : `make frontend-rebuild`.
  # Pour lint/typecheck : voir le service `frontend-tools` (profile tools).
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    image: resonance/frontend:starter
    container_name: resonance-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      # Côté SSR : Nuxt SSR appelle l'API en passant par Nginx (réseau
      # Docker), exactement comme un client. Cela garde la chaîne réelle
      # SSR → Nginx → FPM dans la mesure perf.
      NUXT_API_BASE_INTERNAL: http://nginx/api/v1
      # Côté client (browser) : passe également par Nginx exposé sur l'host.
      NUXT_PUBLIC_API_BASE: http://localhost:${NGINX_PORT:-8080}/api/v1
      # Médias servis directement par MinIO (anonymous download activé).
      NUXT_PUBLIC_MEDIA_BASE: http://localhost:${MINIO_API_PORT:-9000}/${MINIO_BUCKET:-resonance}
    networks:
      - resonance

  # Frontal HTTP unique de la stack starter (Phase 4-bis).
  # - /api/*   → fastcgi_pass backend:9000 (PHP-FPM).
  # - le reste → proxy_pass http://frontend:3000 (Nuxt SSR Node preview).
  # Image fholzer/nginx-brotli : modules brotli compilés MAIS NON ACTIVÉS
  # (cf. config). Volontairement non tunée — gzip/brotli/HTTP2/Cache-Control
  # absents, à introduire dans solution/j1-cdn-cache.
  nginx:
    image: fholzer/nginx-brotli:latest
    container_name: resonance-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites/resonance.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - resonance

  # Service utilitaire pour lint et type-check sans rebuilder l'image
  # frontend (qui ne contient ni les devDependencies ni le source au
  # runtime). Profil "tools" : ne démarre pas avec `docker compose up`.
  # Usage : `make frontend-lint` / `make frontend-typecheck`.
  frontend-tools:
    image: node:20-alpine
    container_name: resonance-frontend-tools
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./frontend:/app
      - frontend_tools_node_modules:/app/node_modules
    profiles: ["tools"]
    networks:
      - resonance

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
  # Cache des node_modules pour le service `frontend-tools` (lint/typecheck).
  frontend_tools_node_modules:

networks:
  resonance:
    driver: bridge
