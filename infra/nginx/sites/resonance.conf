# =============================================================================
# Resonance — virtual host (starter non optimisé, Phase 4-bis)
# =============================================================================
# Frontal HTTP unique pour la stack Resonance :
#   - /api/*   → fastcgi_pass backend:9000 (PHP-FPM, front-controller
#                 /app/public/index.php).
#   - le reste → proxy_pass http://frontend:3000 (Nuxt SSR Node preview).
#
# Tout ce qui touche au caching HTTP, à la compression, à HTTP/2 et au
# Cache-Control sur les assets statiques est volontairement absent — chaque
# absence porte un marqueur @perf-debt et sera résolue dans la branche
# solution/j1-cdn-cache.
# =============================================================================

upstream backend_fpm {
    # @perf-debt: pas de `keepalive` ni `fastcgi_keep_conn on;` — chaque
    # requête FastCGI ouvre une connexion neuve. Résolu en J3 (Octane).
    server backend:9000;
}

upstream nuxt_node {
    server frontend:3000;
}

server {
    # @perf-debt: HTTP/1.1 uniquement. Pas de `listen … http2;` ni TLS.
    # Résolu en branche solution/j1-cdn-cache (`listen 443 ssl http2;`).
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 64M;

    # ---- API Laravel (FastCGI vers PHP-FPM) ---------------------------------
    # Tout `/api/*` est forwardé au front-controller `/app/public/index.php`.
    # Pas de `try_files` ni de root : Nginx n'a aucun accès au filesystem du
    # backend (par design — pas de bind-mount partagé). Le path PHP ciblé est
    # passé en dur via SCRIPT_FILENAME ; Laravel route ensuite via REQUEST_URI.
    location /api/ {
        fastcgi_pass backend_fpm;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME  /app/public/index.php;
        fastcgi_param SCRIPT_NAME      /index.php;
        fastcgi_param DOCUMENT_ROOT    /app/public;
        fastcgi_param REQUEST_URI      $request_uri;
        fastcgi_param QUERY_STRING     $query_string;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;

        # Timeouts généreux : le checkout starter peut atteindre 25 s sous
        # charge (cf. baseline k6-starter checkout-stress).
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    # ---- Statiques Nuxt (_nuxt/*) -------------------------------------------
    # @perf-debt: pas de Cache-Control sur _nuxt/*. Pourtant ces assets sont
    # immutables (URL fingerprintée par Vite), candidats parfaits à
    # `Cache-Control: public, max-age=31536000, immutable`. Résolu en branche
    # solution/j1-cdn-cache.
    location /_nuxt/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pas de `expires`, pas de `add_header Cache-Control` — voir @perf-debt.
    }

    # ---- Médias servis par Nuxt (cas marginal) ------------------------------
    # Le starter référence les médias directement depuis MinIO via
    # NUXT_PUBLIC_MEDIA_BASE (browser → :9000). Cette location reste pour
    # cohérence si un asset /media/* est jamais servi par Nuxt.
    # @perf-debt: pas de Cache-Control sur /media/*. Résolu en branche
    # solution/j1-cdn-cache (`Cache-Control: public, max-age=86400, ...`).
    location /media/ {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Tout le reste → Nuxt SSR -------------------------------------------
    location / {
        proxy_pass http://nuxt_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
