# =============================================================================
# Resonance — nginx.conf (solution/j1-cdn-cache : tuning HTTP de J1)
# =============================================================================
# Image utilisée : fholzer/nginx-brotli (modules ngx_http_brotli_static_module
# et ngx_http_brotli_filter_module compilés statiquement, ACTIVÉS dans cette
# branche).
#
# Cette branche solution/j1-cdn-cache active les optimisations HTTP qui
# étaient absentes du starter Phase 4-bis : compression (gzip + brotli),
# Cache-Control sur les statiques (cf. resonance.conf), HTTP/2 (h2c).
# Chaque marqueur @perf-debt résolu est annoté @perf-fix.
# =============================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Compression : gzip --------------------------------------------
    # @perf-fix: solution/j1-cdn-cache — gzip activé sur les types compressibles.
    # Sur le profil Lighthouse Mobile / Slow 4G, le payload HTML/JSON/JS/CSS
    # divisé par ~5 fait chuter le LCP home (16.3 s → cible < 6 s).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # @perf-fix: solution/j1-cdn-cache — gzip_static : si une variante .gz
    # pré-compressée est présente à côté de l'asset (Nuxt n'en émet pas par
    # défaut, mais c'est sans risque et bénéfique si /j2-bundle l'active).
    gzip_static on;

    # ---- Compression : brotli ------------------------------------------
    # @perf-fix: solution/j1-cdn-cache — brotli activé. Modules embarqués
    # par fholzer/nginx-brotli ; mêmes types que gzip. Brotli batte gzip de
    # ~20 % sur les payloads HTML/JS, et `brotli_static on` sert les `.br`
    # pré-compressés si présents.
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ---- Tuning TCP basique --------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ---- Logs -----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct="$upstream_connect_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ---- Tailles & timeouts --------------------------------------------
    client_max_body_size 64M;
    client_body_timeout  60s;
    client_header_timeout 60s;

    # ---- Inclusion des virtual hosts -----------------------------------
    include /etc/nginx/conf.d/*.conf;
}
