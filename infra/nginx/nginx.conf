# =============================================================================
# Resonance — nginx.conf (starter Phase 4-bis : non optimisé)
# =============================================================================
# Image utilisée : fholzer/nginx-brotli (modules ngx_http_brotli_static_module
# et ngx_http_brotli_filter_module compilés statiquement, mais NON ACTIVÉS
# en starter — c'est l'objet de la branche solution/j1-cdn-cache).
#
# Ce fichier configure le frontal HTTP du starter en mode "réaliste mais
# volontairement non tuné". Toutes les optimisations qui SERONT introduites
# dans solution/j1-cdn-cache portent un marqueur @perf-debt.
# =============================================================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Compression ----------------------------------------------------
    # @perf-debt: gzip OFF — les réponses HTML/JSON sont envoyées en clair,
    # ce qui pénalise le payload sous bande passante mobile (Slow 4G du
    # profil Lighthouse). Résolu en branche solution/j1-cdn-cache (atelier
    # "j1-cdn-cache" : `gzip on; gzip_types text/css application/javascript
    # application/json …`).
    gzip off;

    # @perf-debt: brotli OFF — les modules ngx_brotli_static + ngx_brotli
    # sont COMPILÉS dans cette image (fholzer/nginx-brotli) mais
    # volontairement désactivés. Résolu en branche solution/j1-cdn-cache
    # (`brotli on; brotli_static on;`).
    # brotli off;        ← directive omise plutôt que `off` pour éviter
    # brotli_static off; ← un éventuel "unknown directive" si l'image change.

    # ---- Tuning TCP basique --------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ---- Logs -----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct="$upstream_connect_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ---- Tailles & timeouts --------------------------------------------
    client_max_body_size 64M;
    client_body_timeout  60s;
    client_header_timeout 60s;

    # ---- Inclusion des virtual hosts -----------------------------------
    include /etc/nginx/conf.d/*.conf;
}
